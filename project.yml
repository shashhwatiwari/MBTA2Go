name: CommuteAssistant
options:
  bundleIdPrefix: com.commuteassistant
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: 1

targets:
  CommuteAssistant:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CommuteAssistant
    dependencies:
      - target: CommuteKit
      - target: CommuteWidgets
      - target: CommuteIntents
    settings:
      base:
        INFOPLIST_FILE: CommuteAssistant/Info.plist
        CODE_SIGN_ENTITLEMENTS: CommuteAssistant/CommuteAssistant.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.commuteassistant.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: CommuteAssistant/CommuteAssistant.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.commuteassistant
    info:
      path: CommuteAssistant/Info.plist
      properties:
        UILaunchScreen: {}
        BGTaskSchedulerPermittedIdentifiers:
          - com.commuteassistant.refresh
          - com.commuteassistant.process
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
          - location
        NSLocationWhenInUseUsageDescription: "CommuteAssistant uses your location to show nearby stops and relevant commute info."
        NSLocationAlwaysAndWhenInUseUsageDescription: "CommuteAssistant uses your location to detect when you're near a stop and send timely commute alerts."
        NSSupportsLiveActivities: true

  CommuteKit:
    type: framework
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CommuteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.commuteassistant.kit
        SUPPORTS_MACCATALYST: false
        GENERATE_INFOPLIST_FILE: true

  CommuteWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CommuteWidgets
    dependencies:
      - target: CommuteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.commuteassistant.app.widgets
        INFOPLIST_FILE: CommuteWidgets/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: CommuteWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  CommuteIntents:
    type: extensionkit-extension
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CommuteIntents
    dependencies:
      - target: CommuteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.commuteassistant.app.intents
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_EXAppExtensionAttributes_EXExtensionPointIdentifier: com.apple.appintents-extension

  CommuteKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - CommuteKitTests
    dependencies:
      - target: CommuteKit

schemes:
  CommuteAssistant:
    build:
      targets:
        CommuteAssistant: all
        CommuteKit: all
        CommuteWidgets: all
        CommuteIntents: all
        CommuteKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CommuteKitTests
